name: update-feed

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        run: |
          cd astro
          npm ci

      - name: Update feed
        run: |
          python3 scripts/fetch_feed.py
          ./scripts/build_site.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/messages.json data/meta.json docs/index.html tmp/channel.html
          git diff --cached --quiet || git commit -m "Update feed"
          git push
